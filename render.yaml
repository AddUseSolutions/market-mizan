# Render Blueprint (optional): New → Blueprint → Repo auswählen
#
# Ablauf:
# 1. PostgreSQL aus dieser Blueprint anlegen (oder separat erstellen).
# 2. Web Service "backend" mit Root Directory backend, Build: npm install, Start: npm start.
# 3. DATABASE_URL vom Postgres an den Service knüpfen.
# 4. Einmalig in der Render-Shell: cd backend && npm run db:migrate
# 5. Static Site "frontend": Root frontend, Build npm install && npm run build, Publish dist
# 6. VITE_API_URL = öffentliche Backend-URL (wichtig: vor dem Build setzen)
# 7. Optional SEO/Analytics (vor Frontend-Build): VITE_GA_MEASUREMENT_ID, VITE_GOOGLE_SITE_VERIFICATION
#    Nach Go-live: Google Search Console → Property https://mmizan.com → Sitemaps:
#    https://mmizan.com/sitemap-index.xml

databases:
  - name: market-mizan-db
    databaseName: market_mizan
    user: market_mizan

services:
  - type: web
    name: market-mizan-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: market-mizan-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://mmizan.com
      - key: PUBLIC_SITE_URL
        value: https://mmizan.com
      # Hostpoint SMTP — Passwort nur im Render-Dashboard setzen (Secret)
      - key: CONTACT_TO_EMAIL
        value: hello@mmizan.com
      - key: ADMIN_NOTIFY_EMAIL
        value: hello@mmizan.com
      - key: MAIL_FROM
        value: "Market Mizan <hello@mmizan.com>"
      - key: SMTP_HOST
        value: asmtp.mail.hostpoint.ch
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: hello@mmizan.com
      - key: SMTP_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FX_ETB_USD
        value: "130"
      - key: JUSTPROPERTY_REPAIR_PRICES_ON_START
        value: "true"
    healthCheckPath: /health

  - type: web
    name: market-mizan-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        value: "+251941881133"
      - key: VITE_GA_MEASUREMENT_ID
        sync: false

  # Just Property crawl STOPPED — listings assigned to EPM broker.
  # Set SCRAPER_SOURCE=justproperty only if you intentionally re-enable crawling.
  - type: cron
    name: market-mizan-scraper
    runtime: python
    rootDir: scraper
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    schedule: "0 3 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-mizan-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SCRAPER_SOURCE
        value: off
      - key: SCRAPER_SKIP_IF_SCRAPED_WITHIN_HOURS
        value: "336"
      - key: FX_ETB_USD
        value: "130"
      - key: FX_ZAR_ETB
        value: "7.2"
      - key: SCRAPER_BATCH_SIZE
        value: "1"
      - key: SCRAPER_CONCURRENCY
        value: "2"
      - key: SCRAPER_BATCH_COOLDOWN_SEC
        value: "2"
      - key: SCRAPER_BROWSER_LIGHT_MODE
        value: "true"
      - key: SCRAPER_BROWSER_TEXT_MODE
        value: "true"
      - key: JUSTPROPERTY_MAX_SEARCH_PAGES
        value: "10"
      - key: REALETHIO_PAGINATION_EXTRA_SLEEP_SEC
        value: "5"
