version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: market_mizan_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: market_mizan
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  mysql_data:
