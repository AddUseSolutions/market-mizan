<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Market Mizan (mmizan.com) — compare verified homes for rent and sale in Addis Ababa. Search apartments, houses and villas by neighborhood, price and size."

      name="keywords"

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

      name="twitter:description"

    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://mmizan.com/#organization",
            "name": "Market Mizan",
            "alternateName": ["mmizan", "Mizan", "mmizan.com"],

            "email": "hello@mmizan.com",

            "url": "https://mmizan.com/",
            "publisher": { "@id": "https://mmizan.com/#organization" },
            "inLanguage": ["en", "am", "om", "ar"],

              "@type": "SearchAction",

              },
              "query-input": "required name=search_term_string"

          },
          {
